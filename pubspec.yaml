name: movies_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0' # تم تغيير الحد الأدنى ليتوافق مع جهازك

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  easy_localization: ^3.0.8
  flutter_screenutil: ^5.9.0
  google_fonts: ^8.0.2
  flutter_native_splash: ^2.4.7
  introduction_screen: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0 # تم تقليل الإصدار هنا أيضاً ليتناسب مع البيئة الحالية

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/on_boarding_images/
    - assets/splash_images/
    - assets/translations/